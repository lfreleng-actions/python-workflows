---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Reusable Python build/test/release pipeline (multiple architectures).
#
# Reproduces the canonical Linux Foundation Python release pipeline,
# fanned out across an architecture matrix (x64 + arm64 by default). The
# repository-metadata job runs in parallel as an informational step.
# After python-build, audit and the SBOM/Grype scan run in parallel;
# python-tests is deferred until they pass, then the release is promoted.
# PyPI publishing is performed by the CALLER (see the attach-artefacts
# note below):
#   tag-validate -> python-metadata -> python-build (matrixed) ->
#   { python-audit (matrixed) | sbom -> grype (per-arch) } ->
#   python-tests -> attach-artefacts -> promote-release
#
# Each matrixed build/test/audit job runs on a 2-D matrix of architecture
# (from the `runners` input) crossed with Python version (discovered by
# the python-metadata job). The SBOM and Grype jobs run per-arch only,
# because native dependency trees differ per architecture but not per
# Python version.
#
# Native pre-build steps (system packages, C builds) are supplied by the
# consumer through the optional `setup_script` hook, which runs in every
# matrixed job type after checkout and before the action.
#
# Call this from a thin caller workflow on a tag push; see
# examples/build-test-release-multiarch/ for both a plain GitHub-native
# caller and a Gerrit-wrapped caller.
name: '[R] Python Build/Test/Release Multi-Arch'

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      # --- Checkout target (defaults to the calling repository) ---
      repository:
        description: 'Repository to check out (owner/name)'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch/tag/SHA to check out (empty = default branch)'
        required: false
        type: string
        default: ''

      # --- Project layout / build ---
      path_prefix:
        description: 'Path to the project root directory'
        required: false
        type: string
        default: '.'
      build_formats:
        description: "Build formats: 'sdist', 'wheel', or 'both'"
        required: false
        type: string
        default: ''
      tox_build:
        description: 'Build the project using tox'
        required: false
        type: boolean
        default: false

      # --- Multi-architecture build ---
      runners:
        description: >-
          JSON array of {runner, arch} objects defining the architecture
          matrix. 'runner' supplies runs-on; 'arch' names artefacts. The
          default includes ubuntu-24.04-arm; GitHub-hosted arm64 runners
          are freely available on public repositories, so private repos
          may need to override this input.
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: '[{"runner":"ubuntu-latest","arch":"x64"},{"runner":"ubuntu-24.04-arm","arch":"arm64"}]'
      auditwheel:
        description: 'Repair Linux wheels with auditwheel (manylinux)'
        required: false
        type: boolean
        default: true
      manylinux_version:
        description: 'manylinux platform tag for auditwheel repair'
        required: false
        type: string
        default: 'manylinux_2_38'
      make:
        description: 'Run make targets via python-build-action'
        required: false
        type: boolean
        default: false
      make_args:
        description: 'Arguments passed to make-action (via python-build)'
        required: false
        type: string
        default: ''
      setup_script:
        description: >-
          Path to a committed setup script run after checkout in every
          matrixed job (build/test/audit/sbom). Empty = skip.
        required: false
        type: string
        default: ''
      ld_library_path:
        description: 'LD_LIBRARY_PATH exported for the test step'
        required: false
        type: string
        default: ''

      # --- Tests ---
      tests_enabled:
        description: 'Run the tests job (set false to skip tests)'
        required: false
        type: boolean
        default: true
      tox_tests:
        description: 'Run tests using tox'
        required: false
        type: boolean
        default: false
      tox_envs:
        description: 'Comma-separated list of tox environments to run'
        required: false
        type: string
        default: ''
      tests_path:
        description: 'Path to the test directory'
        required: false
        type: string
        default: ''
      pytest_args:
        description: 'Extra arguments passed to pytest'
        required: false
        type: string
        default: ''
      test_permit_fail:
        description: 'Permit test failures without failing the workflow'
        required: false
        type: boolean
        default: false
      test_artifact_path:
        description: >-
          Path (relative to path_prefix) of test output/reports to
          upload as a workflow artefact; empty disables the upload
        required: false
        type: string
        default: ''

      # --- Audit ---
      audit_enabled:
        description: 'Run the dependency audit job (set false to skip)'
        required: false
        type: boolean
        default: true
      audit_permit_fail:
        description: 'Permit dependency audit failures (the NO_BLOCK pattern)'
        required: false
        type: boolean
        default: false
      audit_ignore_vulns:
        description: 'Vulnerability identifiers to ignore during the audit'
        required: false
        type: string
        default: ''
      audit_allow_list_config:
        description: 'Allow-list config reference for python-audit-action'
        required: false
        type: string
        default: ''

      # --- SBOM ---
      sbom_enabled:
        description: >-
          Generate an SBOM (set false to skip; also skips the
          dependent Grype scan job)
        required: false
        type: boolean
        default: true
      sbom_include_dev:
        description: 'Include development dependencies in the SBOM'
        required: false
        type: boolean
        default: false
      sbom_format:
        description: "SBOM output format: 'json' or 'both'"
        required: false
        type: string
        default: 'both'

      # --- Grype scan ---
      grype_fail_on:
        description: 'Minimum severity that fails the Grype scan'
        required: false
        type: string
        default: 'medium'
      grype_permit_fail:
        description: >-
          Permit Grype findings without failing the job. When false, falls
          back to the NO_BLOCK_AUDIT_FAIL repository variable at runtime.
        required: false
        type: boolean
        default: false

      # --- Job timeouts ---
      build_timeout_minutes:
        description: 'Timeout (minutes) for the build job'
        required: false
        type: number
        default: 20
      test_timeout_minutes:
        description: 'Timeout (minutes) for the tests job'
        required: false
        type: number
        default: 20
      audit_timeout_minutes:
        description: 'Timeout (minutes) for the audit, SBOM and Grype jobs'
        required: false
        type: number
        default: 15

      # --- Runner hardening ---
      harden_runner_egress:
        description: "Harden-runner egress policy: 'block' or 'audit'"
        required: false
        type: string
        default: 'block'
      harden_runner_allowlist:
        description: 'Out-of-band harden-runner allow-list configuration'
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # --- Gerrit-aware checkout (empty unless dispatched via Gerrit) ---
      gerrit_refspec:
        description: 'Gerrit refspec of the change under test'
        required: false
        type: string
        default: ''
      gerrit_project:
        description: 'Gerrit project name'
        required: false
        type: string
        default: ''
      gerrit_branch:
        description: 'Gerrit target branch'
        required: false
        type: string
        default: ''
      gerrit_url:
        description: >-
          Gerrit server URL. Empty falls back to the GERRIT_URL repository
          variable at runtime.
        required: false
        type: string
        default: ''

      # --- Release ---
      attestations:
        description: 'Generate build provenance attestations'
        required: false
        type: boolean
        default: true
      sigstore_sign:
        description: 'Sign build artefacts with Sigstore'
        required: false
        type: boolean
        default: true

    outputs:
      tag:
        description: 'Validated release tag/version string'
        value: ${{ jobs.tag-validate.outputs.tag }}

permissions: {}

jobs:
  gerrit-validate:
    name: 'Validate Workflow Inputs'
    # Fails fast with a clear message on invalid workflow inputs: the
    # test artefact path, job timeouts, and the Gerrit parameters (when
    # gerrit_refspec is set without the project/branch the Gerrit
    # checkout path also requires). The build-chain root job depends on
    # this, so invalid inputs stop the pipeline early and cleanly. This
    # job always runs (only some validation steps are conditional), so
    # gating dependents on it does not trip GitHub's "skipped need
    # skips dependents" behaviour.
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    steps:
      - name: 'Validate path_prefix input'
        shell: bash
        env:
          PATH_PREFIX: ${{ inputs.path_prefix }}
        run: |
          # Require a relative, non-traversing path: later jobs cd
          # into it and derive artefact/publish paths from it, so an
          # empty value, absolute paths or .. segments could escape
          # the checkout
          # A single trailing slash is tolerated ('./' == '.',
          # 'subdir/' == 'subdir')
          PATH_PREFIX="${PATH_PREFIX%/}"
          if [ "${PATH_PREFIX}" = '.' ]; then
            exit 0
          fi
          if [[ ! "${PATH_PREFIX}" =~ ^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*$ ]] \
            || [[ "${PATH_PREFIX}" =~ (^|/)\.\.(/|$) ]]; then
            echo "::error::Invalid path_prefix input: ${PATH_PREFIX}"
            exit 1
          fi

      - name: 'Validate test_artifact_path input'
        if: inputs.test_artifact_path != ''
        shell: bash
        env:
          TEST_ARTIFACT_PATH: ${{ inputs.test_artifact_path }}
        run: |
          # Require a relative, non-traversing path (the * wildcard
          # permitted): the tests job joins it onto path_prefix for
          # the artefact upload, so absolute paths or .. segments
          # could pull in files from outside the checkout
          valid='^[A-Za-z0-9._*-]+(/[A-Za-z0-9._*-]+)*/?$'
          if [[ ! "${TEST_ARTIFACT_PATH}" =~ ${valid} ]] \
            || [[ "${TEST_ARTIFACT_PATH}" =~ (^|/)\.\.(/|$) ]]; then
            echo "::error::Invalid test_artifact_path input:" \
              "${TEST_ARTIFACT_PATH}"
            exit 1
          fi

      - name: 'Validate job timeout inputs'
        shell: bash
        env:
          BUILD_TIMEOUT: ${{ inputs.build_timeout_minutes }}
          TEST_TIMEOUT: ${{ inputs.test_timeout_minutes }}
          AUDIT_TIMEOUT: ${{ inputs.audit_timeout_minutes }}
        run: |
          # Require whole-minute timeouts in the range 1-360 (the
          # GitHub-hosted runner job cap). Values GitHub itself
          # rejects (e.g. fractional numbers) can fail workflow
          # evaluation before this step runs; for values that do
          # reach it (zero, negative or out-of-range), this gives a
          # clear fail-fast error
          error=0
          for entry in \
            "build_timeout_minutes=${BUILD_TIMEOUT}" \
            "test_timeout_minutes=${TEST_TIMEOUT}" \
            "audit_timeout_minutes=${AUDIT_TIMEOUT}"; do
            name="${entry%%=*}"; value="${entry#*=}"
            if [[ ! "${value}" =~ ^[0-9]+$ ]] \
              || [ "${value}" -lt 1 ] || [ "${value}" -gt 360 ]; then
              echo "::error::Invalid ${name} input: ${value}"
              error=1
            fi
          done
          exit "${error}"

      - name: 'Require Gerrit project, branch and URL'
        if: inputs.gerrit_refspec != ''
        shell: bash
        env:
          GERRIT_PROJECT: ${{ inputs.gerrit_project }}
          GERRIT_BRANCH: ${{ inputs.gerrit_branch }}
          # yamllint disable-line rule:line-length
          GERRIT_URL: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
        run: |
          # gerrit_refspec is set, so the Gerrit checkout path runs and
          # also requires gerrit_project, gerrit_branch and a resolvable
          # Gerrit URL (the gerrit_url input or the GERRIT_URL variable).
          missing=''
          if [ -z "${GERRIT_PROJECT}" ]; then
            missing="${missing} gerrit_project"
          fi
          if [ -z "${GERRIT_BRANCH}" ]; then
            missing="${missing} gerrit_branch"
          fi
          if [ -z "${GERRIT_URL}" ]; then
            missing="${missing} gerrit_url/GERRIT_URL"
          fi
          if [ -n "${missing}" ]; then
            echo "::error::gerrit_refspec is set but missing:${missing}"
            exit 1
          fi
          echo "Gerrit inputs validated ✅"

  repository-metadata:
    name: 'Repository Metadata'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@88b21cb7f6f1772e3a2a4d729451635ca5f5486a  # v0.2.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: ${{ inputs.gerrit_refspec != '' }}
          artifact_upload: 'true'
          artifact_formats: 'json'

  tag-validate:
    name: 'Validate Tag Push'
    needs: gerrit-validate
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # Needed to draft a release
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag-validate.outputs.tag_name }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: 'Verify pushed tag'
        id: 'tag-validate'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@bc8043ec074495cc8cdf351623ebab3675d563cf  # v1.0.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'  # Cannot verify GPG without key

      - name: 'Ensure draft release exists'
        id: 'ensure-release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure draft release exists
          TAG="${{ steps.tag-validate.outputs.tag_name }}"
          # Check if release exists and get its draft status
          if RELEASE_INFO=$(gh release view "$TAG" \
            --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for tag $TAG already exists"
            else
              echo "::error::A published release already exists for $TAG;" \
                "delete or recreate it as a draft, then re-run."
              exit 1
            fi
          else
            echo "Creating draft release for tag $TAG"
            gh release create "$TAG" \
              --draft \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi

  python-metadata:
    name: 'Extract Project Metadata'
    needs: 'tag-validate'
    runs-on: ubuntu-latest
    outputs:
      # Bare JSON array of Python versions consumed by the matrixed jobs.
      versions_json: ${{ steps.versions.outputs.versions_json }}
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Extract Python project metadata'
        id: metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/build-metadata-action@ed0cc5bcf3a7ddd4e40058c46fc4211eb71b7f86  # v0.5.0
        with:
          path_prefix: ${{ inputs.path_prefix }}
          output_format: summary
          include_environment: true
          use_version_extract: true
          verbose: true

      # Extract the bare version list from the build-metadata matrix
      # object so the matrixed jobs can cross it with the architecture
      # dimension.
      - name: 'Derive Python version matrix'
        id: versions
        shell: bash
        env:
          MATRIX_JSON: ${{ steps.metadata.outputs.python_matrix_json }}
        run: |
          # Derive the bare JSON array of Python versions
          versions=$(printf '%s' "${MATRIX_JSON}" | \
            jq -c '."python-version"')
          echo "Python versions: ${versions}"
          echo "versions_json=${versions}" >> "$GITHUB_OUTPUT"

  python-build:
    name: 'Build ${{ matrix.target.arch }} py${{ matrix.python-version }}'
    needs: 'python-metadata'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.runners) }}
        # yamllint disable-line rule:line-length
        python-version: ${{ fromJson(needs.python-metadata.outputs.versions_json) }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      contents: read
      id-token: write       # Needed for attestations
      attestations: write   # Needed for attestations
    timeout-minutes: ${{ inputs.build_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Validate setup script path'
        if: inputs.setup_script != ''
        id: setup-script-check
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/path-check-action@b51f09959a4a71eff2e2f175bf80400ae8576f63  # v0.2.1
        with:
          path: ${{ inputs.setup_script }}
      - name: 'Run setup script'
        if: inputs.setup_script != ''
        shell: bash
        env:
          SETUP_SCRIPT: ${{ inputs.setup_script }}
          SCRIPT_TYPE: ${{ steps.setup-script-check.outputs.type }}
        run: |
          # Run the consumer-supplied native setup script
          if [ "${SCRIPT_TYPE}" != 'file' ]; then
            echo "::error::setup_script '${SETUP_SCRIPT}' is not a file"
            exit 1
          fi
          bash "${SETUP_SCRIPT}"

      - name: 'Build Python project ${{ matrix.python-version }}'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@97cf36d2a5914c94761408545d154c983024de1d  # v2.0.0
        with:
          # yamllint disable-line rule:line-length
          artefact_name: dist-${{ matrix.target.arch }}-py${{ matrix.python-version }}
          path_prefix: ${{ inputs.path_prefix }}
          python_version: ${{ matrix.python-version }}
          build_formats: ${{ inputs.build_formats || 'both' }}
          tox_build: ${{ inputs.tox_build }}
          auditwheel: ${{ inputs.auditwheel }}
          manylinux_version: ${{ inputs.manylinux_version }}
          make: ${{ inputs.make }}
          make_args: ${{ inputs.make_args }}
          sigstore_sign: ${{ inputs.sigstore_sign }}
          attestations: ${{ inputs.attestations }}

  # Release variant: gate downstream strictly on python-build success.
  # A broken build means no release, so there is no value in running
  # the test/audit matrix. (The non-release variant instead gates on
  # python-metadata to surface every failure on a PR.)
  python-tests:
    name: 'Tests ${{ matrix.target.arch }} py${{ matrix.python-version }}'
    # Deferred until the audit operations (python-audit and the SBOM ->
    # Grype scan) pass, so the expensive test matrix is skipped on audit
    # failure. Disabled audit/SBOM jobs report 'skipped' and do not
    # block the tests, but the direct sbom check keeps a genuine SBOM
    # failure (which also skips Grype) gating the tests as before.
    needs: ['python-metadata', 'python-build', 'python-audit', 'sbom', 'grype']
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.python-build.result == 'success' && contains(fromJSON('["success", "skipped"]'), needs.python-audit.result) && contains(fromJSON('["success", "skipped"]'), needs.sbom.result) && contains(fromJSON('["success", "skipped"]'), needs.grype.result) && inputs.tests_enabled }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.runners) }}
        # yamllint disable-line rule:line-length
        python-version: ${{ fromJson(needs.python-metadata.outputs.versions_json) }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.test_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Validate setup script path'
        if: inputs.setup_script != ''
        id: setup-script-check
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/path-check-action@b51f09959a4a71eff2e2f175bf80400ae8576f63  # v0.2.1
        with:
          path: ${{ inputs.setup_script }}
      - name: 'Run setup script'
        if: inputs.setup_script != ''
        shell: bash
        env:
          SETUP_SCRIPT: ${{ inputs.setup_script }}
          SCRIPT_TYPE: ${{ steps.setup-script-check.outputs.type }}
        run: |
          # Run the consumer-supplied native setup script
          if [ "${SCRIPT_TYPE}" != 'file' ]; then
            echo "::error::setup_script '${SETUP_SCRIPT}' is not a file"
            exit 1
          fi
          bash "${SETUP_SCRIPT}"

      - name: 'Python tests [pytest] ${{ matrix.python-version }}'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@4129c285f63e4d004b9e615b881f44cd63ba5f45  # v1.2.0
        env:
          LD_LIBRARY_PATH: ${{ inputs.ld_library_path }}
        with:
          python_version: ${{ matrix.python-version }}
          path_prefix: ${{ inputs.path_prefix }}
          tox_tests: ${{ inputs.tox_tests }}
          tox_envs: ${{ inputs.tox_envs }}
          tests_path: ${{ inputs.tests_path }}
          pytest_args: ${{ inputs.pytest_args }}
          permit_fail: ${{ inputs.test_permit_fail }}
          # yamllint disable-line rule:line-length
          artefact_name: coverage-${{ matrix.target.arch }}-py${{ matrix.python-version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Upload test artefacts'
        if: ${{ !cancelled() && inputs.test_artifact_path != '' }}
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          # yamllint disable-line rule:line-length
          name: python-test-results-${{ matrix.target.arch }}-py${{ matrix.python-version }}
          path: ${{ inputs.path_prefix }}/${{ inputs.test_artifact_path }}
          retention-days: 7
          if-no-files-found: warn

  python-audit:
    name: 'Audit ${{ matrix.target.arch }} py${{ matrix.python-version }}'
    needs: ['python-metadata', 'python-build']
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.python-build.result == 'success' && inputs.audit_enabled }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.runners) }}
        # yamllint disable-line rule:line-length
        python-version: ${{ fromJson(needs.python-metadata.outputs.versions_json) }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Validate setup script path'
        if: inputs.setup_script != ''
        id: setup-script-check
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/path-check-action@b51f09959a4a71eff2e2f175bf80400ae8576f63  # v0.2.1
        with:
          path: ${{ inputs.setup_script }}
      - name: 'Run setup script'
        if: inputs.setup_script != ''
        shell: bash
        env:
          SETUP_SCRIPT: ${{ inputs.setup_script }}
          SCRIPT_TYPE: ${{ steps.setup-script-check.outputs.type }}
        run: |
          # Run the consumer-supplied native setup script
          if [ "${SCRIPT_TYPE}" != 'file' ]; then
            echo "::error::setup_script '${SETUP_SCRIPT}' is not a file"
            exit 1
          fi
          bash "${SETUP_SCRIPT}"

      - name: 'Audit dependencies ${{ matrix.python-version }}'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@fcb1b2e0cdbe19edf11057e598138f3d57f2b249  # v0.3.1
        with:
          python_version: ${{ matrix.python-version }}
          path_prefix: ${{ inputs.path_prefix }}
          permit_fail: ${{ inputs.audit_permit_fail }}
          ignore_vulns: ${{ inputs.audit_ignore_vulns }}
          config: ${{ inputs.audit_allow_list_config }}
          # yamllint disable-line rule:line-length
          artefact_name: dist-${{ matrix.target.arch }}-py${{ matrix.python-version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: 'SBOM ${{ matrix.target.arch }}'
    needs: 'python-build'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.python-build.result == 'success' && inputs.sbom_enabled }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.runners) }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Validate setup script path'
        if: inputs.setup_script != ''
        id: setup-script-check
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/path-check-action@b51f09959a4a71eff2e2f175bf80400ae8576f63  # v0.2.1
        with:
          path: ${{ inputs.setup_script }}
      - name: 'Run setup script'
        if: inputs.setup_script != ''
        shell: bash
        env:
          SETUP_SCRIPT: ${{ inputs.setup_script }}
          SCRIPT_TYPE: ${{ steps.setup-script-check.outputs.type }}
        run: |
          # Run the consumer-supplied native setup script
          if [ "${SCRIPT_TYPE}" != 'file' ]; then
            echo "::error::setup_script '${SETUP_SCRIPT}' is not a file"
            exit 1
          fi
          bash "${SETUP_SCRIPT}"

      - name: 'Generate SBOM (${{ matrix.target.arch }})'
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@60648e3351a48617d40f68ccb1f143e050f74c96  # v0.1.1
        with:
          path_prefix: ${{ inputs.path_prefix }}
          include_dev: ${{ inputs.sbom_include_dev }}
          # The Grype job scans the JSON SBOM, so JSON must
          # always exist. sbom_format is documented as 'json' or
          # 'both'; a stray, undocumented 'xml' is coerced to 'both'
          # because workflow_call inputs cannot enforce an enum.
          # yamllint disable-line rule:line-length
          sbom_format: ${{ inputs.sbom_format == 'xml' && 'both' || inputs.sbom_format }}

      - name: 'Upload SBOM artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files-${{ matrix.target.arch }}
          # Glob matches whichever SBOM formats sbom_format produced
          path: sbom-cyclonedx.*
          retention-days: 45
          if-no-files-found: warn

      - name: 'SBOM summary'
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.target.arch }}
        run: |
          # SBOM summary
          {
            echo "## SBOM Summary ($TARGET_ARCH)"
            echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
            echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
          } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype ${{ matrix.target.arch }}'
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.runners) }}
    # Each SBOM is architecture-specific (native dependency trees can
    # differ per arch), but scanning a CycloneDX JSON SBOM does not require
    # the target architecture, so the per-arch scans all run on a standard
    # x64 runner.
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download SBOM (${{ matrix.target.arch }})'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files-${{ matrix.target.arch }}

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      # The grype_permit_fail input (or, when unset, the NO_BLOCK_AUDIT_FAIL
      # repository variable) disables failure propagation so pull requests
      # can proceed when blocked by newly discovered CVEs in transitive
      # dependencies.
      - name: 'Grype audit SBOM'
        id: grype-audit
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_FAIL_ON: ${{ inputs.grype_fail_on }}
          # yamllint disable-line rule:line-length
          NO_BLOCK_AUDIT_FAIL: ${{ inputs.grype_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        shell: bash
        run: |
          # The audit scans the JSON CycloneDX SBOM, which the sbom job
          # always generates. Guard anyway so the step still emits a
          # summary (and honours grype_permit_fail) if it is missing.
          if [ ! -f sbom-cyclonedx.json ]; then
            echo "::warning::No JSON SBOM found; Grype scan skipped"
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              echo "No JSON SBOM available to scan."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              exit 0
            fi
            echo "::error::No JSON SBOM available for the Grype audit"
            exit 1
          fi

          # Run grype once, emitting all three output formats
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-results.sarif" \
            -o "json=grype-results.json" \
            -o "table=grype-results.txt" \
            --fail-on "${GRYPE_FAIL_ON}" \
            "sbom:sbom-cyclonedx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results ---"
          if [ -f grype-results.txt ]; then
            cat grype-results.txt
          else
            echo "No table output produced"
          fi

          # grype returns 2 when it finds vulnerabilities at or above the
          # configured --fail-on threshold; any other non-zero exit is
          # treated as a grype failure.
          if [ "${grype_exit}" = "0" ]; then
            echo "No vulnerabilities at or above '${GRYPE_FAIL_ON}'"
            exit 0
          fi
          if [ "${grype_exit}" != "2" ]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
            echo "::warning::Grype found vulnerabilities at or above the" \
              "'${GRYPE_FAIL_ON}' threshold, but failures are permitted" \
              "so the job will not fail."
            exit 0
          fi
          echo "::error::Grype found vulnerabilities at or above the" \
            "'${GRYPE_FAIL_ON}' severity threshold. See the table above" \
            "for the offending packages and CVEs."
          exit 1

      - name: 'Upload Grype scan results'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results-${{ matrix.target.arch }}
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 'Grype summary'
        if: always()
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.target.arch }}
        run: |
          # Render a Markdown summary of the Grype findings
          {
            echo "## Grype Vulnerability Scan ($TARGET_ARCH)"
            echo ""
            if [ ! -f grype-results.json ]; then
              echo "No scan results available"
              exit 0
            fi
            match_count=$(jq '.matches | length' grype-results.json)
            if [ "${match_count}" = "0" ]; then
              echo "No vulnerabilities found at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} matching Grype record(s)."
          } >> "$GITHUB_STEP_SUMMARY"

  # Attach build artefacts prior to release promotion
  # This enables the GitHub immutable releases feature
  #
  # NOTE: PyPI publishing is intentionally NOT performed by this reusable
  # workflow. Trusted publishing matches the OIDC job_workflow_ref claim
  # against the calling repository, so the caller MUST run the publish
  # steps itself. This workflow stops at promoting the GitHub release; the
  # caller stacks the Test PyPI/PyPI publish jobs after it, consuming the
  # run-scoped 'dist-*' build artefacts and the workflow's 'tag' output.
  #
  # The multi-arch build job is matrixed (arch x version) and therefore
  # produces multiple dist-* artefacts rather than a single named one;
  # they are merged into a shared dist/ directory before attachment.
  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build'
      - 'python-tests'
      - 'python-audit'
      - 'sbom'
      - 'grype'
    # tests/audit/sbom skip when their enable toggles are false (and
    # grype skips when the SBOM does); tolerate skipped results, but
    # never a failure (a failed test run, audit, SBOM or Grype scan
    # blocks the release here)
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.python-build.result == 'success' && contains(fromJSON('["success", "skipped"]'), needs.python-tests.result) && contains(fromJSON('["success", "skipped"]'), needs.python-audit.result) && contains(fromJSON('["success", "skipped"]'), needs.sbom.result) && contains(fromJSON('["success", "skipped"]'), needs.grype.result) }}
    permissions:
      contents: write  # IMPORTANT: needed to edit release, attach artefacts
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: '⬇ Download build artefacts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'dist-*'
          path: 'dist'
          merge-multiple: true

      - name: 'Attach build artefacts to release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@22a6302f3d1775e4a192c45235cc7833a2781b12  # v0.1.1
        with:
          asset_paths: '["dist/**"]'
          release_tag: ${{ needs.tag-validate.outputs.tag }}

  promote-release:
    name: 'Promote Draft Release'
    needs:
      - 'tag-validate'
      - 'attach-artefacts'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # IMPORTANT: needed for draft release promotion
    timeout-minutes: 2
    outputs:
      # yamllint disable-line rule:line-length
      release_url: ${{ steps.promote-release.outputs.release_url || steps.set-promoted-url.outputs.release_url }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          if gh release view "$TAG" --json isDraft --jq '.isDraft' \
              2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted, skipping promotion"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft or doesn't exist, " \
                 "proceeding with promotion"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@072990900b99030363d81d4131c2bf2855f07df0  # v0.1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag-validate.outputs.tag }}
          latest: true

      - name: 'Set release URL for already promoted release'
        id: 'set-promoted-url'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
