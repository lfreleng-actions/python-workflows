---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Exercises the reusable workflows in this repository against three of the
# largest downstream Python consumers, in parallel, to prove the reusable
# workflows function end-to-end:
#   * dependamerge  (standard single-arch) -> build-test.yaml
#   * lftools-uv    (standard single-arch) -> build-test.yaml
#   * python-nss-ng (multi-arch C build)   -> build-test-multiarch.yaml
#
# The reusable workflows are referenced by LOCAL path so this always
# validates the current branch's workflows. Each target is checked out at
# its default/HEAD branch.
name: 'Testing 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches: ['main']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Standard single-arch consumers, fanned out in parallel via a matrix.
  standard:
    name: 'Standard'
    strategy:
      fail-fast: false
      matrix:
        repository:
          - lfreleng-actions/dependamerge
          - lfreleng-actions/lftools-uv
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/build-test.yaml
    with:
      repository: ${{ matrix.repository }}

  # Multi-arch C consumer (runs in parallel with the standard matrix).
  #
  # python-nss-ng needs the committed native setup script
  # (.github/scripts/setup-nss.sh) for the test/audit/sbom jobs to pass.
  # That script (and the reusable-workflow migration) currently lives only
  # on the fork, so this leg temporarily targets the fork. A later
  # python-workflows PR repoints it at lfreleng-actions/python-nss-ng once
  # the migration lands upstream.
  multiarch:
    name: 'Multi-Arch'
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/build-test-multiarch.yaml
    with:
      # Testing: temporarily use main until updates made in upstream repo
      repository: modeseven-lfreleng-actions/python-nss-ng
      ref: main
      make: true
      make_args: 'deps-nss env-github-actions'
      setup_script: '.github/scripts/setup-nss.sh'
