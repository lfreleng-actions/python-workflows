---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Reusable Python build/test/release pipeline (single architecture).
#
# Reproduces the canonical Linux Foundation Python release pipeline. The
# repository-metadata job runs in parallel as an informational step.
# After python-build the jobs in { } run in parallel (none gates
# another, so all failures surface); the publish chain then gates on
# all of them:
#   tag-validate -> python-build -> { tests | audit | sbom -> grype }
#     -> test-pypi -> pypi -> attach-artefacts -> promote-release
#
# Call this from a thin caller workflow on a tag push; see
# examples/build-test-release/ for both a plain GitHub-native caller and
# a Gerrit-wrapped caller.
name: '[R] Python Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      # --- Checkout target (defaults to the calling repository) ---
      repository:
        description: 'Repository to check out (owner/name)'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch/tag/SHA to check out (empty = default branch)'
        required: false
        type: string
        default: ''

      # --- Project layout / build ---
      path_prefix:
        description: 'Path to the project root directory'
        required: false
        type: string
        default: '.'
      build_formats:
        description: "Build formats: 'sdist', 'wheel', or 'both'"
        required: false
        type: string
        default: ''
      tox_build:
        description: 'Build the project using tox'
        required: false
        type: boolean
        default: false

      # --- Tests ---
      tox_tests:
        description: 'Run tests using tox'
        required: false
        type: boolean
        default: false
      tox_envs:
        description: 'Comma-separated list of tox environments to run'
        required: false
        type: string
        default: ''
      tests_path:
        description: 'Path to the test directory'
        required: false
        type: string
        default: ''
      pytest_args:
        description: 'Extra arguments passed to pytest'
        required: false
        type: string
        default: ''
      test_permit_fail:
        description: 'Permit test failures without failing the workflow'
        required: false
        type: boolean
        default: false

      # --- Audit ---
      audit_permit_fail:
        description: 'Permit dependency audit failures (the NO_BLOCK pattern)'
        required: false
        type: boolean
        default: false
      audit_ignore_vulns:
        description: 'Vulnerability identifiers to ignore during the audit'
        required: false
        type: string
        default: ''
      audit_allow_list_config:
        description: 'Allow-list config reference for python-audit-action'
        required: false
        type: string
        default: ''

      # --- SBOM ---
      sbom_include_dev:
        description: 'Include development dependencies in the SBOM'
        required: false
        type: boolean
        default: false
      sbom_format:
        description: "SBOM output format: 'json' or 'both'"
        required: false
        type: string
        default: 'both'

      # --- Grype scan ---
      grype_fail_on:
        description: 'Minimum severity that fails the Grype scan'
        required: false
        type: string
        default: 'medium'
      grype_permit_fail:
        description: >-
          Permit Grype findings without failing the job. When false, falls
          back to the NO_BLOCK_AUDIT_FAIL repository variable at runtime.
        required: false
        type: boolean
        default: false

      # --- Runner hardening ---
      harden_runner_egress:
        description: "Harden-runner egress policy: 'block' or 'audit'"
        required: false
        type: string
        default: 'block'
      harden_runner_allowlist:
        description: 'Out-of-band harden-runner allow-list configuration'
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # --- Gerrit-aware checkout (empty unless dispatched via Gerrit) ---
      gerrit_refspec:
        description: 'Gerrit refspec of the change under test'
        required: false
        type: string
        default: ''
      gerrit_project:
        description: 'Gerrit project name'
        required: false
        type: string
        default: ''
      gerrit_branch:
        description: 'Gerrit target branch'
        required: false
        type: string
        default: ''
      gerrit_url:
        description: >-
          Gerrit server URL. Empty falls back to the GERRIT_URL repository
          variable at runtime.
        required: false
        type: string
        default: ''

      # --- Release-only inputs ---
      attestations:
        description: 'Generate build provenance attestations'
        required: false
        type: boolean
        default: true
      sigstore_sign:
        description: 'Sign build artefacts with Sigstore'
        required: false
        type: boolean
        default: true

    outputs:
      tag:
        description: 'Validated release tag/version string'
        value: ${{ jobs.tag-validate.outputs.tag }}

permissions: {}

jobs:
  gerrit-validate:
    name: 'Validate Gerrit Inputs'
    # Fails fast with a clear message when gerrit_refspec is set without
    # the project/branch the Gerrit checkout path also requires. The
    # build-chain root job depends on this, so invalid Gerrit inputs stop
    # the pipeline early and cleanly. This job always runs (only the
    # validation step is conditional), so gating dependents on it does
    # not trip GitHub's "skipped need skips dependents" behaviour.
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    steps:
      - name: 'Require Gerrit project, branch and URL'
        if: inputs.gerrit_refspec != ''
        shell: bash
        env:
          GERRIT_PROJECT: ${{ inputs.gerrit_project }}
          GERRIT_BRANCH: ${{ inputs.gerrit_branch }}
          # yamllint disable-line rule:line-length
          GERRIT_URL: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
        run: |
          # gerrit_refspec is set, so the Gerrit checkout path runs and
          # also requires gerrit_project, gerrit_branch and a resolvable
          # Gerrit URL (the gerrit_url input or the GERRIT_URL variable).
          missing=''
          if [ -z "${GERRIT_PROJECT}" ]; then
            missing="${missing} gerrit_project"
          fi
          if [ -z "${GERRIT_BRANCH}" ]; then
            missing="${missing} gerrit_branch"
          fi
          if [ -z "${GERRIT_URL}" ]; then
            missing="${missing} gerrit_url/GERRIT_URL"
          fi
          if [ -n "${missing}" ]; then
            echo "::error::gerrit_refspec is set but missing:${missing}"
            exit 1
          fi
          echo "Gerrit inputs validated ✅"

  repository-metadata:
    name: 'Repository Metadata'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: ${{ inputs.gerrit_refspec != '' }}
          artifact_upload: 'true'
          artifact_formats: 'json'

  tag-validate:
    name: 'Validate Tag Push'
    needs: gerrit-validate
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # Needed to draft a release
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag-validate.outputs.tag_name }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: 'Verify pushed tag'
        id: 'tag-validate'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@461d187a53b5de27b068c2cea5af972c085a4a6a  # v1.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'  # Cannot verify GPG without key

      - name: 'Ensure draft release exists'
        id: 'ensure-release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure draft release exists
          TAG="${{ steps.tag-validate.outputs.tag_name }}"
          # Check if release exists and get its draft status
          if RELEASE_INFO=$(gh release view "$TAG" \
            --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for tag $TAG already exists"
            else
              echo "::error::A published release already exists for $TAG;" \
                "delete or recreate it as a draft, then re-run."
              exit 1
            fi
          else
            echo "Creating draft release for tag $TAG"
            gh release create "$TAG" \
              --draft \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi

  python-build:
    name: 'Python Build'
    needs: 'tag-validate'
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: ${{ steps.python-build.outputs.matrix_json }}
      artefact_name: ${{ steps.python-build.outputs.artefact_name }}
      artefact_path: ${{ steps.python-build.outputs.artefact_path }}
    permissions:
      contents: read
      id-token: write       # Needed for attestations
      attestations: write   # Needed for attestations
    timeout-minutes: 12
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@5f570d5d17a7315074a824a91c6a705b6fc5c7dd  # v1.1.2
        with:
          path_prefix: ${{ inputs.path_prefix }}
          build_formats: ${{ inputs.build_formats || 'both' }}
          tox_build: ${{ inputs.tox_build }}
          sigstore_sign: ${{ inputs.sigstore_sign }}
          attestations: ${{ inputs.attestations }}

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    # Deferred until the audit operations (python-audit and Grype) pass, so
    # the expensive test matrix is skipped when either audit step fails.
    needs:
      - 'python-build'
      - 'python-audit'
      - 'grype'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.python-build.result == 'success' && needs.python-audit.result == 'success' && needs.grype.result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.python-build.outputs.matrix_json) }}
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: 'Python tests [pytest] ${{ matrix.python-version }}'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@aa753462f090101dcb0c4708e9499f55e276e373  # v1.1.2
        with:
          python_version: ${{ matrix.python-version }}
          path_prefix: ${{ inputs.path_prefix }}
          tox_tests: ${{ inputs.tox_tests }}
          tox_envs: ${{ inputs.tox_envs }}
          tests_path: ${{ inputs.tests_path }}
          pytest_args: ${{ inputs.pytest_args }}
          permit_fail: ${{ inputs.test_permit_fail }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.python-build.outputs.matrix_json) }}
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: 'Audit dependencies ${{ matrix.python-version }}'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@78b00a589ced3e8f70d0cd03fd592b8c92298dfd  # v0.3.0
        with:
          python_version: ${{ matrix.python-version }}
          path_prefix: ${{ inputs.path_prefix }}
          permit_fail: ${{ inputs.audit_permit_fail }}
          ignore_vulns: ${{ inputs.audit_ignore_vulns }}
          config: ${{ inputs.audit_allow_list_config }}
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: 'Generate SBOM'
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          path_prefix: ${{ inputs.path_prefix }}
          include_dev: ${{ inputs.sbom_include_dev }}
          # The Grype audit below scans the JSON SBOM, so JSON must
          # always exist. sbom_format is documented as 'json' or
          # 'both'; a stray, undocumented 'xml' is coerced to 'both'
          # because workflow_call inputs cannot enforce an enum.
          # yamllint disable-line rule:line-length
          sbom_format: ${{ inputs.sbom_format == 'xml' && 'both' || inputs.sbom_format }}

      - name: 'Upload SBOM artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          # Glob matches whichever SBOM formats sbom_format produced
          path: sbom-cyclonedx.*
          retention-days: 45
          if-no-files-found: warn

      - name: 'SBOM summary'
        shell: bash
        run: |
          # SBOM summary
          {
            echo "## SBOM Summary"
            echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
            echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
          } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download SBOM artefact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      # The grype_permit_fail input (or, when unset, the NO_BLOCK_AUDIT_FAIL
      # repository variable) disables failure propagation so pull requests
      # can proceed when blocked by newly discovered CVEs in transitive
      # dependencies.
      - name: 'Grype audit SBOM'
        id: grype-audit
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_FAIL_ON: ${{ inputs.grype_fail_on }}
          # yamllint disable-line rule:line-length
          NO_BLOCK_AUDIT_FAIL: ${{ inputs.grype_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        shell: bash
        run: |
          # The audit scans the JSON CycloneDX SBOM, which the sbom step
          # always generates. Guard anyway so the step still emits a
          # summary (and honours grype_permit_fail) if it is missing.
          if [ ! -f sbom-cyclonedx.json ]; then
            echo "::warning::No JSON SBOM found; Grype scan skipped"
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              echo "No JSON SBOM available to scan."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              exit 0
            fi
            echo "::error::No JSON SBOM available for the Grype audit"
            exit 1
          fi

          # Run grype once, emitting all three output formats
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-results.sarif" \
            -o "json=grype-results.json" \
            -o "table=grype-results.txt" \
            --fail-on "${GRYPE_FAIL_ON}" \
            "sbom:sbom-cyclonedx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results ---"
          if [ -f grype-results.txt ]; then
            cat grype-results.txt
          else
            echo "No table output produced"
          fi

          # grype returns 2 when it finds vulnerabilities at or above the
          # configured --fail-on threshold; any other non-zero exit is
          # treated as a grype failure.
          if [ "${grype_exit}" = "0" ]; then
            echo "No vulnerabilities at or above '${GRYPE_FAIL_ON}'"
            exit 0
          fi
          if [ "${grype_exit}" != "2" ]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
            echo "::warning::Grype found vulnerabilities at or above the" \
              "'${GRYPE_FAIL_ON}' threshold, but failures are permitted" \
              "so the job will not fail."
            exit 0
          fi
          echo "::error::Grype found vulnerabilities at or above the" \
            "'${GRYPE_FAIL_ON}' severity threshold. See the table above" \
            "for the offending packages and CVEs."
          exit 1

      - name: 'Upload Grype scan results'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 'Grype summary'
        if: always()
        shell: bash
        run: |
          # Render a Markdown summary of the Grype findings
          {
            echo "## Grype Vulnerability Scan"
            echo ""
            if [ ! -f grype-results.json ]; then
              echo "No scan results available"
              exit 0
            fi
            match_count=$(jq '.matches | length' grype-results.json)
            if [ "${match_count}" = "0" ]; then
              echo "No vulnerabilities found at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} matching Grype record(s)."
          } >> "$GITHUB_STEP_SUMMARY"

  # Attach build artefacts prior to release promotion
  # This enables the GitHub immutable releases feature
  #
  # NOTE: PyPI publishing is intentionally NOT performed by this reusable
  # workflow. Trusted publishing matches the OIDC job_workflow_ref claim
  # against the calling repository, so the caller MUST run the publish
  # steps itself. This workflow stops at promoting the GitHub release; the
  # caller stacks the Test PyPI/PyPI publish jobs after it, consuming the
  # run-scoped build artefact and the workflow's 'tag' output.
  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build'
      - 'python-tests'
    permissions:
      contents: write  # IMPORTANT: needed to edit release, attach artefacts
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: '⬇ Download build artefacts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.python-build.outputs.artefact_name }}
          path: ${{ needs.python-build.outputs.artefact_path }}

      - name: 'Attach build artefacts to release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@985ecd2ba521dde165514af406dd114d3db5dab6  # v0.1.0
        with:
          asset_paths: '["${{ needs.python-build.outputs.artefact_path }}/**"]'
          release_tag: ${{ needs.tag-validate.outputs.tag }}

  promote-release:
    name: 'Promote Draft Release'
    needs:
      - 'tag-validate'
      - 'attach-artefacts'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # IMPORTANT: needed for draft release promotion
    timeout-minutes: 2
    outputs:
      # yamllint disable-line rule:line-length
      release_url: ${{ steps.promote-release.outputs.release_url || steps.set-promoted-url.outputs.release_url }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          if gh release view "$TAG" --json isDraft --jq '.isDraft' \
              2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted, skipping promotion"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft or doesn't exist, " \
                 "proceeding with promotion"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@cd7cf442875ecaea5dbb070d0de94f21ece107c8  # v0.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag-validate.outputs.tag }}
          latest: true

      - name: 'Set release URL for already promoted release'
        id: 'set-promoted-url'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
