# =============================================================================
# EXAMPLE: Gerrit-sourced release caller for the build-test-release workflow
# =============================================================================
# Use this form when Gerrit is the source of truth (SCM) for your project.
#
# Unlike the verify workflow (which gerrit_to_platform dispatches per
# patchset and votes on), a RELEASE is driven by a tag. For Gerrit
# projects the release tag is pushed to Gerrit and replicated to the
# GitHub mirror, where it fires this standard tag-push event. There is no
# Gerrit change context on a tag, so no votes or comments are cast — this
# caller is therefore identical in shape to the GitHub-native release
# caller (github.yaml), and release workflows are tag-triggered ONLY (no
# workflow_dispatch).
#
# PyPI PUBLISHING IS PERFORMED HERE, NOT IN THE REUSABLE WORKFLOW.
# PyPI trusted publishing matches the OIDC job_workflow_ref claim against
# THIS repository (the GitHub mirror), so a reusable workflow can never be
# a trusted publisher. The reusable `release` job builds, tests, audits,
# attaches artefacts and promotes the draft release; the `test-pypi` and
# `pypi` jobs below then publish the run-scoped build artefact it produced.
# Configure a PyPI trusted publisher for this repository's workflow +
# environment first.
# =============================================================================
name: 'Gerrit Release'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

env:
  # Harden-runner egress allow-list shared by the publish jobs. Matches the
  # default used inside the reusable workflow; override for your project.
  # yamllint disable-line rule:line-length
  HARDEN_RUNNER_ALLOWLIST: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

jobs:
  release:
    name: 'Build/Test/Release'
    permissions:
      contents: write       # Create the GitHub release / attach assets
      id-token: write       # OIDC for build provenance attestations
      attestations: write   # Build provenance attestations
    # REPLACE the pinned SHA below with a python-workflows release SHA.
    # The all-zero SHA is a non-functional placeholder, NOT a real commit.
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/python-workflows/.github/workflows/build-test-release.yaml@0000000000000000000000000000000000000000  # REPLACE: vX.Y.Z
    # All inputs are optional; uncomment to tune.
    # with:
    #   path_prefix: '.'
    #   attestations: true
    #   sigstore_sign: true

  # ---------------------------------------------------------------------------
  # PyPI publishing — runs in THIS repository so trusted publishing works.
  # Both jobs consume the run-scoped build artefact the reusable workflow
  # produced and the `tag` output it exposes.
  # ---------------------------------------------------------------------------
  test-pypi:
    name: 'Test PyPI Publishing'
    needs: release
    runs-on: 'ubuntu-latest'
    # MUST match the environment configured on the Test PyPI trusted publisher.
    environment:
      name: development
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ env.HARDEN_RUNNER_ALLOWLIST }}
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Test PyPI publishing'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: development
          tag: ${{ needs.release.outputs.tag }}
          trusted_publishing: 'true'

  pypi:
    name: 'Release PyPI Package'
    needs:
      - release
      - test-pypi
    runs-on: 'ubuntu-latest'
    # MUST match the environment configured on the PyPI trusted publisher.
    environment:
      name: production
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ env.HARDEN_RUNNER_ALLOWLIST }}
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'PyPI release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: production
          tag: ${{ needs.release.outputs.tag }}
          trusted_publishing: 'true'
          attestations: true
